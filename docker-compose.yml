version: '3.8'
services:
  zip-tie-3d-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zip-tie-3d-showcase
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
